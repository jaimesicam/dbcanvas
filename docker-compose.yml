services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: dbcanvas:latest
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    environment:
      # The container always listens on all interfaces internally (the
      # Dockerfile sets APP_HOST=0.0.0.0); host-side exposure is controlled by
      # the publish binding below, not by this value.
      APP_PORT: ${APP_PORT:-8080}
      DB_PATH: /data/dbcanvas.db
      # Domain used to configure deployed stacks (Intranet: LDAP/mail/DNS/CA).
      DOMAIN: ${DOMAIN:-example.net}
      # Catalog of installable versions (produced by `make versions`).
      VERSIONS_FILE: /etc/dbcanvas/versions.yaml
      # Default DB users created on deployed Percona XtraDB Cluster nodes.
      APP_PASSWORD: ${APP_PASSWORD:-app_password}
      REPL_PASSWORD: ${REPL_PASSWORD:-repl_password}
      MONITOR_PASSWORD: ${MONITOR_PASSWORD:-monitor_password}
      CLUSTER_PASSWORD: ${CLUSTER_PASSWORD:-cluster_password}
      # clustercheck@'localhost' password — PXC clustercheck health endpoint for HAProxy.
      CLUSTERCHECK_PASSWORD: ${CLUSTERCHECK_PASSWORD:-cluster_password}
      # Root/superuser + admin passwords for MySQL/PXC/GR/InnoDB nodes.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_ADMIN_PASSWORD: ${MYSQL_ADMIN_PASSWORD:-admin_password}
      # Superuser/admin passwords for the other database + ProxySQL engines.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-valkey_password}
      PROXYSQL_ADMIN_PASSWORD: ${PROXYSQL_ADMIN_PASSWORD:-admin_password}
      MONGODB_ADMIN_PASSWORD: ${MONGODB_ADMIN_PASSWORD:-admin_password}
      # Password for the "pmm" monitoring user created in Valkey (PMM add valkey).
      PMM_PASSWORD: ${PMM_PASSWORD:-pmm_password}
      # Minutes a provisioner waits for a dependency (cluster/node/service) to
      # become ready before failing the deploy. Raise for large stacks.
      DEPLOYMENT_TIMEOUT: ${DEPLOYMENT_TIMEOUT:-60}
      # Host interface that deployed stack nodes bind their published (exported)
      # ports to. Default 127.0.0.1 (loopback only); set 0.0.0.0 for all interfaces.
      CONTAINER_BIND_IP: ${CONTAINER_BIND_IP:-127.0.0.1}
    ports:
      # Publish on APP_HOST (default 127.0.0.1 = private). Set APP_HOST=0.0.0.0
      # in .env to expose on all host interfaces.
      - "${APP_HOST:-127.0.0.1}:${APP_PORT:-8080}:${APP_PORT:-8080}"
    volumes:
      - app-data:/data            # SQLite database persists across rebuilds
      # Catalog of installable versions (Percona Server per image + PMM3),
      # produced by `make versions`. Mounted read-only; re-run `make versions`
      # on the host to refresh what the version pickers offer.
      - ./versions.yaml:/etc/dbcanvas/versions.yaml:ro
      # Stack Designer drives Docker on the host to deploy/manage stack
      # containers (Docker-out-of-Docker). The app talks to this socket via the
      # Engine API using only the Go stdlib — no docker CLI in the image.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/dbcanvas", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  app-data:
